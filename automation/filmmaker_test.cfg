// ============================================================
//  Filmmaker "Demos" tab - console aliases for the test harness
//  Copied into CS2's game/csgo/cfg/ by test-filmmaker.ps1.
//  Load in-game with:  exec filmmaker_test
//  (or add  +exec filmmaker_test  to HLAE's CS2 launch options)
//
//  Note: key binds do NOT fire in the main menu, so these are
//  console shorthand only - type them at the `~` console.
// ============================================================

alias fm_status  "mirv_filmmaker ui_status"   // Panorama bridge health
alias fm_scan    "mirv_filmmaker scan"        // rescan for demos
alias fm_list    "mirv_filmmaker list"        // list demos (names vs [unknown])
alias fm_folders "mirv_filmmaker folders"     // show scanned folders
alias fm_ui      "mirv_filmmaker ui"          // open Watch -> Downloaded
alias fm_rebuild "mirv_filmmaker ui_rebuild"  // force UI rebuild next frame

echo "[filmmaker] test aliases loaded: fm_status fm_scan fm_list fm_folders fm_ui fm_rebuild"
